<section style="padding: 1rem; border: 2px dashed #4caf50; border-radius: 0.6rem; margin-top: 1rem;">
  <h3>Counter (NgRx Store pattern)</h3>
  <p>Demonstrate global state with actions, reducer, and store select.</p>

  <div style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem;">
    <button (click)="decrement()">-</button>
    <span style="min-width: 2rem; text-align: center;">{{ count$ | async }}</span>
    <button (click)="increment()">+</button>
  </div>

  <button (click)="reset()">Reset</button>
</section>
